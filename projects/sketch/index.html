<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            HEADER (1200px max width, 50px height)
        </header>
        
        <nav class="navbar">
            NAVBAR (1200px max width, 25px height)
        </nav>
        
        <main class="main-section">
            <div class="col">COLUMN 1</div>
            <div class="col">COLUMN 2</div>
            <div class="col">COLUMN 3</div>
            <div class="col">COLUMN 4</div>
            <div class="col">COLUMN 5</div>
            <div class="col">COLUMN 6</div>
        </main>
        
        <footer class="footer">
            <div class="footer-col">COL 1</div>
            <div class="footer-col">COL 2</div>
            <div class="footer-col">COL 3</div>
        </footer>
    </div>
</body>
</html>
